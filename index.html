<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App-ka Hagbadda rasmiga ah - Ultimate Version</title>
    
    <style>
        body {
            background-color: #121212;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background-color: #2d2d2d;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background-color: #1e90ff;
        }

        .app-box {
            background-color: #1c1c1c;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 580px;
            box-sizing: border-box;
        }

        .app-content {
            display: none;
        }

        .app-content.active {
            display: block;
        }

        /* CALCULATOR STYLE */
        #display {
            width: 100%;
            height: 70px;
            background-color: #2d2d2d;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 32px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button.calc {
            height: 60px;
            border-radius: 10px;
            border: none;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
        }

        .num { background-color: #404040; color: white; }
        .op { background-color: #ff9f0a; color: white; }
        .fn { background-color: #a5a5a5; color: black; }

        /* HAGBADA STYLE */
        h3, h4 {
            color: #1e90ff;
            text-align: center;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            color: #aaa;
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background-color: #2d2d2d;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
        }

        /* Qaybta Magacyada Dynamic-ga ah */
        .dynamic-names-box {
            background-color: #252525;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px dashed #555;
        }

        .dynamic-input-row {
            margin-bottom: 8px;
        }

        .dynamic-input-row label {
            font-size: 12px;
            color: #ff9f0a;
        }

        .action-btn {
            width: 100%;
            padding: 12px;
            background-color: #1e90ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .group-card {
            background-color: #2d2d2d;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 5px solid #ff9f0a;
            color: white;
            position: relative;
        }

        .group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .group-card h5 {
            margin: 0;
            font-size: 18px;
            color: #ff9f0a;
        }

        .delete-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }

        .delete-btn:hover { background-color: #dc2626; }

        .member-row {
            background-color: #1c1c1c;
            padding: 10px 12px;
            border-radius: 6px;
            margin-top: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .member-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-paid { background-color: #10b981; color: white; }
        .status-unpaid { background-color: #ef4444; color: white; }
        
        .pay-now-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: 0.2s;
        }
        
        .pay-now-btn:hover { background-color: #059669; }
        .winner-badge { color: #ff9f0a; font-weight: bold; margin-left: 5px; }

        .cycle-select {
            margin-top: 10px;
            padding: 7px;
            background: #444;
            color: white;
            border: none;
            border-radius: 4px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="tab-container">
        <button class="tab-btn active" onclick="beddelApp('calculator-app', this)">Mashiinka Xisaabta</button>
        <button class="tab-btn" onclick="beddelApp('hagbad-app', this)">Kooxaha Hagbadda</button>
    </div>

    <div class="app-box">
        
        <!-- 1. CALCULATOR -->
        <div id="calculator-app" class="app-content active">
            <input type="text" id="display" readonly value="0">
            <div class="calc-buttons">
                <button class="calc fn" onclick="tirtirDhammaan()">C</button>
                <button class="calc fn" onclick="tirtirHalNambar()">⌫</button>
                <button class="calc fn" onclick="kuDarCalaamad('%')">%</button>
                <button class="calc op" onclick="kuDarCalaamad('/')">/</button>
                
                <button class="calc num" onclick="kuDarNambar('7')">7</button>
                <button class="calc num" onclick="kuDarNambar('8')">8</button>
                <button class="calc num" onclick="kuDarNambar('9')">9</button>
                <button class="calc op" onclick="kuDarCalaamad('*')">x</button>
                
                <button class="calc num" onclick="kuDarNambar('4')">4</button>
                <button class="calc num" onclick="kuDarNambar('5')">5</button>
                <button class="calc num" onclick="kuDarNambar('6')">6</button>
                <button class="calc op" onclick="kuDarCalaamad('-')">-</button>
                
                <button class="calc num" onclick="kuDarNambar('1')">1</button>
                <button class="calc num" onclick="kuDarNambar('2')">2</button>
                <button class="calc num" onclick="kuDarNambar('3')">3</button>
                <button class="calc op" onclick="kuDarCalaamad('+')">+</button>
                
                <button class="calc num" onclick="kuDarNambar('0')" style="grid-column: span 2; width: 100%;">0</button>
                <button class="calc num" onclick="kuDarNambar('.')">.</button>
                <button class="calc op" onclick="xisaabi()">=</button>
            </div>
        </div>

        <!-- 2. HAGBADA -->
        <div id="hagbad-app" class="app-content">
            <h3>Abuur Koox Hagbad ah</h3>
            
            <div class="form-group">
                <label>Magaca Kooxda:</label>
                <input type="text" id="groupName" placeholder="Tusaale: Kooxda Caalamiga">
            </div>

            <div class="form-group">
                <label>Lacagta bishii qofka laga rabo ($):</label>
                <input type="number" id="groupMoney" placeholder="Tusaale: 100">
            </div>

            <div class="form-group">
                <label>Tirada Xubnaha Kooxda:</label>
                <input type="number" id="groupMembersCount" placeholder="Geli tirada, tusaale: 5" oninput="furSanduuqyadaMagacyada()">
            </div>
            
            <div id="dynamicNamesContainer" class="dynamic-names-box" style="display: none;">
                <p style="color: #aaa; font-size: 13px; margin-top:0;">Geli Magacyada Saddexan ee xubnaha:</p>
                <div id="inputsList"></div>
            </div>
            
            <button class="action-btn" onclick="abuurKoox()">Abuur Kooxda</button>
            
            <div style="margin-top: 25px; border-top: 1px solid #333; padding-top: 20px;">
                <h4>Kooxaha Firfircoon:</h4>
                <div id="kooxahaContainer"></div>
            </div>
        </div>

    </div>

    <script>
        function beddelApp(appId, element) {
            document.querySelectorAll('.app-content').forEach(app => app.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(appId).classList.add('active');
            element.classList.add('active');
        }

        // CALCULATOR CODE
        var shaashad = document.getElementById("display");
        function kuDarNambar(nambar) {
            if (shaashad.value === "0") { shaashad.value = nambar; } else { shaashad.value += nambar; }
        }
        function kuDarCalaamad(calaamad) { shaashad.value += calaamad; }
        function tirtirDhammaan() { shaashad.value = "0"; }
        function tirtirHalNambar() {
            let hadda = shaashad.value;
            if (hadda.length > 1) { shaashad.value = hadda.slice(0, -1); } else { shaashad.value = "0"; }
        }
        function xisaabi() {
            try {
                let xisaab = shaashad.value;
                if (xisaab.includes('%')) { xisaab = xisaab.replace('%', '/100'); }
                shaashad.value = eval(xisaab);
            } catch (error) { shaashad.value = "Khalad"; }
        }

        // HAGBADA CODE
        document.addEventListener("DOMContentLoaded", displayGroups);

        function furSanduuqyadaMagacyada() {
            let count = parseInt(document.getElementById("groupMembersCount").value);
            let container = document.getElementById("dynamicNamesContainer");
            let list = document.getElementById("inputsList");
            
            list.innerHTML = ""; 

            if (isNaN(count) || count <= 0) {
                container.style.display = "none";
                return;
            }

            container.style.display = "block";

            for (let i = 1; i <= count; i++) {
                let div = document.createElement("div");
                div.className = "dynamic-input-row";
                div.innerHTML = `
                    <label>Xubin ${i}: Magaca Saddexan</label>
                    <input type="text" class="member-name-input" placeholder="Tusaale: Maxamed Cali Cilmi">
                `;
                list.appendChild(div);
            }
        }

        function abuurKoox() {
            let magaca = document.getElementById("groupName").value.trim();
            let lacag = parseFloat(document.getElementById("groupMoney").value);
            let count = parseInt(document.getElementById("groupMembersCount").value);
            
            let nameInputs = document.querySelectorAll(".member-name-input");
            let xubnahaObjects = [];

            if (magaca === "" || isNaN(lacag) || isNaN(count) || count <= 0) {
                alert("Fadlan buuxi dhammaan meelaha bannaan!");
                return;
            }

            let gashayDhammaan = true;
            nameInputs.forEach((input, index) => {
                let mName = input.value.trim();
                if (mName === "") { gashayDhammaan = false; }
                xubnahaObjects.push({ id: index, magac: mName, bixiyay: false });
            });

            if (!gashayDhammaan) {
                alert("Fadlan geli magacyada dhammaan xubnaha aad sanduuqyada u furtay!");
                return;
            }

            let koox = {
                id: Date.now(),
                magaca: magaca,
                lacag: lacag,
                xubnaha: xubnahaObjects,
                guud: lacag * count,
                wareeggaHadda: 0
            };

            let kooxaha = JSON.parse(localStorage.getItem("ultimateHagbad")) || [];
            kooxaha.push(koox);
            localStorage.setItem("ultimateHagbad", JSON.stringify(kooxaha));

            document.getElementById("groupName").value = "";
            document.getElementById("groupMoney").value = "";
            document.getElementById("groupMembersCount").value = "";
            document.getElementById("dynamicNamesContainer").style.display = "none";

            displayGroups();
        }

        function displayGroups() {
            let container = document.getElementById("kooxahaContainer");
            container.innerHTML = "";
            let kooxaha = JSON.parse(localStorage.getItem("ultimateHagbad")) || [];

            if(kooxaha.length === 0) {
                container.innerHTML = "<p style='color:#777; font-size:13px; text-align:center;'>Weli ma jirto koox la abuuray.</p>";
                return;
            }

            kooxaha.forEach(koox => {
                let card = document.createElement("div");
                card.className = "group-card";
                
                let xubnahaHTML = "";
                koox.xubnaha.forEach((xubin, index) => {
                    let isWinner = (index === koox.wareeggaHadda) ? "<span class='winner-badge'>🎯 Nasiibka (Qaadanaya)</span>" : "";
                    
                    // Xaaladda Bixinta
                    let statusLabel = xubin.bixiyay 
                        ? `<span class="status-badge status-paid">Bixiyay ✅</span>`
                        : `<span class="status-badge status-unpaid">Ma Bixin ❌</span>`;

                    // Badhanka Lacag bixinta tooska ah
                    let payButton = !xubin.bixiyay 
                        ? `<button class="pay-now-btn" onclick="bixiLacagtaQof(${koox.id}, ${xubin.id}, '${xubin.magac}', ${koox.lacag})">Bixi $${koox.lacag}</button>`
                        : `<button class="pay-now-btn" style="background-color:#444; cursor:default;" disabled>OK</button>`;

                    xubnahaHTML += `
                        <div class="member-row">
                            <div><b>${index + 1}.</b> ${xubin.magac} ${isWinner}</div>
                            <div class="member-actions">
                                ${statusLabel}
                                ${payButton}
                            </div>
                        </div>
                    `;
                });

                let optionsHTML = "";
                koox.xubnaha.forEach((xubin, index) => {
                    optionsHTML += `<option value="${index}" ${index === koox.wareeggaHadda ? 'selected' : ''}>${xubin.magac}</option>`;
                });

                card.innerHTML = `
                    <div class="group-header">
                        <h5>${koox.magaca}</h5>
                        <button class="delete-btn" onclick="tirtirKoox(${koox.id})">Tirtir 🗑️</button>
                    </div>
                    <p>💰 Bishii qofka: <b>$${koox.lacag}</b> | 🏦 Guud: <b>$${koox.guud}</b></p>
                    
                    <div style="margin: 10px 0;">
                        <label style="font-size:13px; color:#aaa;">Dooro qofka wareegga leh bishan:</label>
                        <select class="cycle-select" onchange="beddelWareeg(${koox.id}, this.value)">
                            ${optionsHTML}
                        </select>
                    </div>

                    <div style="margin-top: 10px;">
                        <b style="font-size: 13px; color: #ff9f0a;">Xaaladda Xubnaha:</b>
                        ${xubnahaHTML}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // MAAMULKA LACAG BIXINTA QOFKA
        function bixiLacagtaQof(groupId, memberId, magacaXubinta, lacagta) {
            let nambar = prompt(`Qofka: ${magacaXubinta}\nLacagta laga rabo: $${lacagta}\n\nFadlan Geli Nambarkaaga Mobilka (EVC Plus / Premier / jw):`);
            
            if (nambar === null) return; 

            if (nambar.trim() === "") {
                alert("Khalad! Waa inaad nambar soo gelisaa si aad lacagta u bixiso.");
                return;
            }

            let pin = prompt("Fadlan geli PIN-kaaga si aad u xaqiijiso u wareejinta lacagta:");
            
            if (pin === null) return;

            if (pin.trim() === "") {
                alert("Khalad! Ma bixin kartid lacag adoon gelin PIN-kaaga.");
                return;
            }

            // Haddi nambarka iyo pin-kaba la geliyo, isbeddelka samee
            let kooxaha = JSON.parse(localStorage.getItem("ultimateHagbad")) || [];
            let koox = kooxaha.find(g => g.id === groupId);
            if (koox) {
                let xubin = koox.xubnaha.find(m => m.id === memberId);
                if (xubin) {
                    xubin.bixiyay = true; // U beddel inuu bixiyay
                    localStorage.setItem("ultimateHagbad", JSON.stringify(kooxaha));
                    
                    alert(`SUCCESS!\n\n$${lacagta} waxaa laga jaray nambarkaaga (${nambar}).\n"${magacaXubinta}" hadda xaaladiisu waxay noqotay BIXIYAY ✅.`);
                    displayGroups();
                }
            }
        }

        function tirtirKoox(groupId) {
            if (confirm("Ma hubaalbaa inaad rabto inaad tirtirto kooxdan dhan?")) {
                let kooxaha = JSON.parse(localStorage.getItem("ultimateHagbad")) || [];
                kooxaha = kooxaha.filter(g => g.id !== groupId);
                localStorage.setItem("ultimateHagbad", JSON.stringify(kooxaha));
                displayGroups();
            }
        }

        function beddelWareeg(groupId, winnerIndex) {
            let kooxaha = JSON.parse(localStorage.getItem("ultimateHagbad")) || [];
            let koox = kooxaha.find(g => g.id === groupId);
            if (koox) {
                koox.wareeggaHadda = parseInt(winnerIndex);
                localStorage.setItem("ultimateHagbad", JSON.stringify(kooxaha));
                displayGroups();
            }
        }
    </script>

</body>
</html>
