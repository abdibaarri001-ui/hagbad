<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hagbad Cloud Pro & Calculator</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #1e90ff;
            --success: #22c55e;
            --warning: #eab308;
            --danger: #ef4444;
            --text: #ffffff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            background: var(--card-bg);
            border: 1px solid #334155;
            color: var(--text);
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }
        .app-content {
            display: none;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            width: 100%;
            box-sizing: border-box;
        }
        .app-content.active {
            display: block;
        }
        /* Calculator Style */
        .calc-display {
            width: 100%;
            height: 50px;
            background: #0f172a;
            border: 1px solid #334155;
            color: #fff;
            font-size: 24px;
            text-align: right;
            padding: 5px 10px;
            box-sizing: border-box;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .calc-btn {
            padding: 15px;
            font-size: 18px;
            background: #334155;
            border: none;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
        }
        .calc-btn.op { background: var(--warning); color: #000; font-weight: bold; }
        .calc-btn.eq { background: var(--success); grid-column: span 2; }
        .calc-btn.clear { background: var(--danger); }
        /* Form & Cards Style */
        input, select, button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            box-sizing: border-box;
        }
        button.action-btn {
            background: var(--primary);
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .group-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            border: 1px solid #334155;
        }
        .member-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #0f172a;
            padding: 10px;
            margin: 5px 0;
            border-radius: 6px;
            border-left: 4px solid var(--primary);
        }
        .history-box {
            background: #0f172a;
            padding: 8px;
            border-radius: 4px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 12px;
            margin-top: 5px;
        }
        .admin-section-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            border: 1px solid #334155;
        }
        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            color: #000;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="tabs">
            <button class="tab-btn active" onclick="beddelApp('hagbad-app', this)">📦 Hagbad Cloud</button>
            <button class="tab-btn" onclick="beddelApp('calc-app', this)">🧮 Xisaabiye</button>
            <button class="tab-btn" onclick="beddelApp('admin-app', this)">🔑 Admin Dashboard</button>
        </div>

        <!-- ================= HAGBAD APP ================= -->
        <div id="hagbad-app" class="app-content active">
            <h2 style="text-align: center; margin-top:0; color: var(--primary);">Hagbad Cloud Pro</h2>
            
            <div style="display: flex; gap: 10px;">
                <button onclick="codsoKuBiiris()" style="background: var(--success); border: none; font-weight: bold;">➕ Codso Ku Biiris</button>
                <button onclick="furSanduuqCodsiGuud()" style="background: var(--warning); color: black; border: none; font-weight: bold;">⚠️ Dir Cabasho / Beddel PIN</button>
            </div>
            
            <hr style="border-color: #334155; margin: 20px 0;">
            
            <h3>Abuur Koox Cusub</h3>
            <input type="text" id="groupIdInput" placeholder="ID-ga Kooxda (Tusaale: kooxda_daacad)">
            <input type="text" id="groupName" placeholder="Magaca Kooxda">
            <input type="number" id="groupMoney" placeholder="Lacagta bishii qofkiiba (ETB)">
            <input type="text" id="groupAccount" placeholder="Nambarka Akoonka (CBE/E-Birr)">
            <input type="text" id="groupAdmin" placeholder="Magaca Gudoomiyaha">
            <input type="password" id="groupPassword" placeholder="PIN-ka Sirta ah ee Kooxda (Admin PIN)">
            <input type="number" id="groupMembersCount" placeholder="Meqo xubnoood bixinaya?" oninput="furSanduuqyadaMagacyada()">
            
            <div id="dynamicNamesContainer" style="display:none; background:#0f172a; padding:10px; border-radius:5px; margin:10px 0;">
                <h4 style="margin:0 0 10px 0; color:var(--warning);">Geli Xogta Xubnaha:</h4>
                <div id="inputsList"></div>
            </div>
            
            <button class="action-btn" onclick="abuurKoox()">Abuur Kooxda</button>

            <h3 style="margin-top: 30px; color: var(--warning);">Kooxaha Ka Diwangaashan Cloud-ka:</h3>
            <div id="kooxahaContainer"></div>
        </div>

        <!-- ================= CALCULATOR APP ================= -->
        <div id="calc-app" class="app-content">
            <h2 style="text-align: center; margin-top:0;">Mashiinka Xisaabta</h2>
            <input type="text" id="display" class="calc-display" value="0" readonly>
            <div class="calc-grid">
                <button class="calc-btn clear" onclick="tirtirDhammaan()">C</button>
                <button class="calc-btn" onclick="tirtirHalNambar()">⌫</button>
                <button class="calc-btn op" onclick="kuDarCalaamad('%')">%</button>
                <button class="calc-btn op" onclick="kuDarCalaamad('/')">÷</button>
                
                <button class="calc-btn" onclick="kuDarNambar('7')">7</button>
                <button class="calc-btn" onclick="kuDarNambar('8')">8</button>
                <button class="calc-btn" onclick="kuDarNambar('9')">9</button>
                <button class="calc-btn op" onclick="kuDarCalaamad('*')">×</button>
                
                <button class="calc-btn" onclick="kuDarNambar('4')">4</button>
                <button class="calc-btn" onclick="kuDarNambar('5')">5</button>
                <button class="calc-btn" onclick="kuDarNambar('6')">6</button>
                <button class="calc-btn op" onclick="kuDarCalaamad('-')">-</button>
                
                <button class="calc-btn" onclick="kuDarNambar('1')">1</button>
                <button class="calc-btn" onclick="kuDarNambar('2')">2</button>
                <button class="calc-btn" onclick="kuDarNambar('3')">3</button>
                <button class="calc-btn op" onclick="kuDarCalaamad('+')">+</button>
                
                <button class="calc-btn" onclick="kuDarNambar('0')">0</button>
                <button class="calc-btn" onclick="kuDarCalaamad('.')">.</button>
                <button class="calc-btn eq" onclick="xisaabi()">=</button>
            </div>
        </div>

        <!-- ================= ADMIN DASHBOARD ================= -->
        <div id="admin-app" class="app-content">
            <h2 style="text-align: center; margin-top:0;" id="adminWelcomeTitle">Admin Authorization</h2>
            
            <div id="adminAuthBox">
                <label>Dooro Kooxda (Haddii aad tahay Gudoomiye Koox):</label>
                <select id="loginGroupSelect">
                    <option value="">-- Dooro Kooxdaada --</option>
                </select>
                <label>Geli PIN-ka (Master Admin ama Kooxda):</label>
                <input type="password" id="adminPinInput" placeholder="Geli PIN-ka sirta ah">
                <button class="action-btn" onclick="xaqiijiMaamulka()">Gali Dashboard-ka</button>
            </div>

            <div id="adminDashboardContent" style="display: none;">
                <button style="background: var(--danger); border:none; font-weight:bold; margin-bottom:15px;" onclick="kabaxDashboard()">← Ka Bax Dashboard-ka</button>
                
                <!-- 1. LIISKA KOOXDA ANXISINTA LACAGTA -->
                <h3 style="color: var(--success); margin-top:0;">📋 Codsiyada Sugaya Ansixinta Lacagta</h3>
                <div id="pendingPaymentsContainer"></div>
                
                <!-- 2. LIISKA CODSIYADA GUUD (PIN, CABASHO, CILAD) -->
                <div class="admin-section-box" id="generalTicketsSection">
                    <h3 style="color: var(--warning); margin-top: 0;">⚠️ Tikidhada Cabashooyinka & Beddelka PIN-ka</h3>
                    <div id="generalTicketsContainer"></div>
                </div>

                <!-- 3. HAGAAGINTA KOOXAHA -->
                <div class="admin-section-box">
                    <h3 style="color: var(--primary); margin-top: 0;">Hagaajinta & Qiima Dhimista Kooxda</h3>
                    <div id="groupManageSelectorArea">
                        <label>Dooro kooxda aad wax ka beddelayso:</label>
                        <select id="manageGroupSelect" onchange="buuxiXogtaHagaajinta(this.value)">
                            <option value="">-- Dooro Koox --</option>
                        </select>
                    </div>
                    <div style="margin-top: 10px;">
                        <input type="text" id="editGroupName" placeholder="Magaca Kooxda Cusub">
                        <input type="number" id="editGroupMoney" placeholder="Lacagta bishii / Qiima Dhimis (ETB)">
                        <input type="text" id="editGroupAccount" placeholder="Akoonka Cusub">
                        <button style="background: var(--success); font-weight:bold; border:none;" onclick="keydiIsbeddelkaKooxda()">Keydi Isbeddelka 💾</button>
                        <button style="background: var(--danger); font-weight:bold; border:none; margin-top: 5px;" onclick="tirtirKooxdaRasmigaAh()">Tirtir Kooxdaan Gabi ahaanba 🗑️</button>
                    </div>
                </div>
                
                <!-- 4. MASTER ADMIN ONLY AREA -->
                <div id="superAdminOnlySection" style="display: none; margin-top:20px; border-top: 2px dashed #334155; padding-top:15px;">
                    <h3 style='color:var(--primary); margin-top:0;'>Codsiyada Ku Biirista (Master Only)</h3>
                    <div id="joinRequestsContainer"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= JAVASCRIPT CODE ================= -->
    <script>
        const FIREBASE_URL = "https://hagbad-app-142b9-default-rtdb.firebaseio.com"; 
        const MASTER_PIN = "9869";
        
        let authedRole = null; 
        let authedGroupId = null; 
        let dhammaanKooxahaXogtooda = {};

        function beddelApp(appId, element) {
            document.querySelectorAll('.app-content').forEach(app => app.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(appId).classList.add('active');
            element.classList.add('active');
            if(appId === 'admin-app' && authedRole !== null) {
                loadAdminDashboardData();
            }
        }

        // --- CALCULATOR OPERATIONS ---
        var shaashad = document.getElementById("display");
        function kuDarNambar(nambar) { if (shaashad.value === "0") { shaashad.value = nambar; } else { shaashad.value += nambar; } }
        function kuDarCalaamad(calaamad) { shaashad.value += calaamad; }
        function tirtirDhammaan() { shaashad.value = "0"; }
        function tirtirHalNambar() {
            let hadda = shaashad.value;
            if (hadda.length > 1) { shaashad.value = hadda.slice(0, -1); } else { shaashad.value = "0"; }
        }
        function xisaabi() {
            try {
                let xisaab = shaashad.value;
                if (xisaab.includes('%')) { xisaab = xisaab.replace('%', '/100'); }
                shaashad.value = eval(xisaab);
            } catch (error) { shaashad.value = "Khalad"; }
        }

        // --- HAGBAD OPERATIONS ---
        document.addEventListener("DOMContentLoaded", () => {
            sooJiidKooxaha();
            setInterval(sooJiidKooxaha, 4000); 
            setInterval(loadAdminDashboardData, 3000);
        });

        function furSanduuqyadaMagacyada() {
            let count = parseInt(document.getElementById("groupMembersCount").value);
            let container = document.getElementById("dynamicNamesContainer");
            let list = document.getElementById("inputsList");
            list.innerHTML = ""; 
            if (isNaN(count) || count <= 0) { container.style.display = "none"; return; }
            container.style.display = "block";
            for (let i = 1; i <= count; i++) {
                let div = document.createElement("div");
                div.style.style = "margin-bottom: 8px;";
                div.innerHTML = `
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:5px;">
                        <input type="text" class="member-name-input" placeholder="Magaca Xubin ${i}">
                        <input type="password" class="member-pin-input" maxlength="4" placeholder="PIN-ka Xubin ${i} (4 God)">
                    </div>
                `;
                list.appendChild(div);
            }
        }

        async function abuurKoox() {
            let gId = document.getElementById("groupIdInput").value.trim().replace(/\s+/g, '_');
            let magaca = document.getElementById("groupName").value.trim();
            let lacag = parseFloat(document.getElementById("groupMoney").value);
            let account = document.getElementById("groupAccount").value.trim();
            let admin = document.getElementById("groupAdmin").value.trim();
            let password = document.getElementById("groupPassword").value.trim();
            let count = parseInt(document.getElementById("groupMembersCount").value);
            
            let nameInputs = document.querySelectorAll(".member-name-input");
            let pinInputs = document.querySelectorAll(".member-pin-input");
            let xubnahaObjects = [];

            if (gId === "" || magaca === "" || isNaN(lacag) || account === "" || admin === "" || password === "" || isNaN(count) || count <= 0) { 
                alert("Fadlan buuxi dhammaan meelaha bannaan!"); 
                return; 
            }

            let gashayDhammaan = true;
            for(let i=0; i<nameInputs.length; i++) {
                let mName = nameInputs[i].value.trim();
                let mPin = pinInputs[i].value.trim();
                if (mName === "" || mPin.length < 4) { gashayDhammaan = false; }
                xubnahaObjects.push({ id: i, magac: mName, pin: mPin, bixiyayLacag: 0, xaaladda: "unpaid" });
            }

            if (!gashayDhammaan) { alert("Fadlan buuxi magacyada iyo PIN-nada xubnaha!"); return; }

            let koox = { id: gId, magaca: magaca, lacag: lacag, account: account, admin: admin, password: password, xubnaha: xubnahaObjects, guud: lacag * count, wareeggaHadda: 0, taariikhda: [] };

            await fetch(`${FIREBASE_URL}/kooxaha/${gId}.json`, { method: "PUT", body: JSON.stringify(koox) });

            document.getElementById("groupIdInput").value = "";
            document.getElementById("groupName").value = "";
            document.getElementById("groupMoney").value = "";
            document.getElementById("groupAccount").value = "";
            document.getElementById("groupAdmin").value = "";
            document.getElementById("groupPassword").value = "";
            document.getElementById("groupMembersCount").value = "";
            document.getElementById("dynamicNamesContainer").style.display = "none";
            
            alert("Guul! Kooxda cusub waa la abuuray.");
            sooJiidKooxaha();
        }

        // --- NEW FEATURE: SUBMIT GENERAL TICKETS (PIN CHANGE, COMPLAINTS) ---
        async function furSanduuqCodsiGuud() {
            let gId = prompt("Geli ID-ga Kooxdaada:");
            if(!gId) return;
            let magac = prompt("Geli Magacaaga:");
            if(!magac) return;
            
            let nooca = prompt("Dooro Nooca Codsiga:\n1: Beddelka PIN-ka\n2: Cabasho Koox/Admin\n3: Cilad Farsamo");
            let noocaText = "";
            if(nooca === "1") noocaText = "Beddelka PIN-ka";
            else if(nooca === "2") noocaText = "Cabasho";
            else if(nooca === "3") noocaText = "Cilad Farsamo";
            else { alert("Doorasho qaldan!"); return; }

            let fariin = prompt("Geli faahfaahinta codsigaaga ama fariintaada:");
            if(!fariin) return;

            let ticket = {
                groupId: gId,
                magac: magac,
                nooca: noocaText,
                fariin: fariin,
                waqti: new Date().toLocaleString()
            };

            await fetch(`${FIREBASE_URL}/tikidhada/${Date.now()}.json`, { method: "PUT", body: JSON.stringify(ticket) });
            alert("Codsigaaga si habsan ayaa loo keydiyay, Maamulka ayaa dib u eegi doona!");
        }

        async function codsoKuBiiris() {
            let groupId = prompt("Geli ID-ga Kooxda aad rabto inaad ku biirto:");
            if(!groupId) return;
            if(!dhammaanKooxahaXogtooda[groupId]) { alert("Kooxdaan ma jirto!"); return; }

            let magac = prompt("Geli Magacaaga Saddexan:");
            if(!magac) return;
            let pin = prompt("Abuur PIN gaar ah (4 god):");
            if(!pin || pin.length < 4) { alert("PIN-ku waa inuu 4 god yahay!"); return; }

            let codsi = { groupId: groupId, magac: magac, pin: pin, xaaladda: "pending_join" };
            await fetch(`${FIREBASE_URL}/ku_biirista/${groupId}_${Date.now()}.json`, { method: "PUT", body: JSON.stringify(codsi) });
            alert("Codsigaaga ku biirista waa la diray! Master Admin-ka ayaa ansixin doona.");
        }

        async function sooJiidKooxaha() {
            let container = document.getElementById("kooxahaContainer");
            let loginGroupSelect = document.getElementById("loginGroupSelect");
            try {
                let res = await fetch(`${FIREBASE_URL}/kooxaha.json`);
                let data = await res.json();
                
                if(!data || Object.keys(data).length === 0) { 
                    container.innerHTML = "<p style='color:#777; text-align:center;'>Weli ma jirto koox ku jirta Cloud-ka.</p>"; 
                    dhammaanKooxahaXogtooda = {};
                    return; 
                }

                dhammaanKooxahaXogtooda = data;
                let finalHTML = "";
                let loginSelectHTML = `<option value="">-- Dooro Kooxdaada --</option>`;

                Object.keys(data).forEach(key => {
                    let koox = data[key];
                    if(!koox) return;
                    
                    loginSelectHTML += `<option value="${koox.id}">${koox.magaca}</option>`;
                    let wadarBixiyay = 0;
                    let xubnahaHTML = "";
                    
                    if(koox.xubnaha) {
                        koox.xubnaha.forEach((xubin) => {
                            let bixiyayHadda = xubin.bixiyayLacag || 0;
                            wadarBixiyay += bixiyayHadda;
                            let isWinner = (xubin.id === parseInt(koox.wareeggaHadda)) ? "<span class='badge' style='background:#ff9f0a;'>🎯 Nasiibku waa</span>" : "";
                            
                            let statusLabel = "";
                            if (xubin.xaaladda === "paid") {
                                statusLabel = `<span style="color:var(--success);">Bixiyay ✅ (${bixiyayHadda} ETB)</span>`;
                            } else if (xubin.xaaladda === "pending") {
                                statusLabel = `<span style="color:var(--warning);">Sugaya Ansixin ⏳ (${bixiyayHadda} ETB)</span>`;
                            } else {
                                statusLabel = `<span style="color:var(--danger);">Ma Bixin ❌ (${bixiyayHadda}/${koox.lacag} ETB)</span>`;
                            }

                            let payButton = (xubin.xaaladda !== "paid")
                                ? `<button style="background:var(--primary); color:white; border:none; padding:4px 10px; width:auto; margin:0; border-radius:4px; cursor:pointer;" onclick="codsoLacagBixiin('${koox.id}', ${xubin.id}, '${xubin.magac}', ${koox.lacag}, ${bixiyayHadda}, '${koox.account}', '${xubin.pin}')">Bixi</button>`
                                : `<button style="background-color:#444; color:#aaa; border:none; padding:4px 10px; width:auto; margin:0; border-radius:4px;" disabled>OK</button>`;

                            xubnahaHTML += `
                                <div class="member-row">
                                    <div><b>${xubin.id + 1}.</b> ${xubin.magac} ${isWinner}</div>
                                    <div style="display:flex; align-items:center; gap:8px;">${statusLabel} ${payButton}</div>
                                </div>
                            `;
                        });
                    }

                    let dhimanGuud = koox.guud - wadarBixiyay;
                    let logsHTML = "";
                    if(koox.taariikhda) {
                        Object.keys(koox.taariikhda).forEach(lKey => {
                            let log = koox.taariikhda[lKey];
                            logsHTML += `<div>📝 ${log}</div>`;
                        });
                    } else { logsHTML = "<div style='color:#666;'>Weli ma jiro taariikh maaliyadeed bishan.</div>"; }

                    finalHTML += `
                        <div class="group-card">
                            <h4 style="margin-top:0; color:#ff9f0a; display:flex; justify-content:space-between;"><span>${koox.magaca}</span> <span style="font-size:12px; color:#aaa;">ID: ${koox.id}</span></h4>
                            <p style="font-size:12px; color:#aaa; margin:2px 0;">Gudoomiye: <b>${koox.admin}</b> | 💳 Akoonka: <span style="color:var(--primary); font-weight:bold;">${koox.account}</span></p>
                            <p style="font-size:13px; margin:5px 0;">Khasnada Hadda: <b style="color:var(--success);">${wadarBixiyay} ETB</b> | Ka Maqan: <b style="color:var(--danger);">${dhimanGuud} ETB</b></p>
                            <p style="font-size:13px; margin:5px 0;">Bishii qofki: <b>${koox.lacag} ETB</b> | Guud ahaan wareegga: <b>${koox.guud} ETB</b></p>
                            <div style="margin:10px 0;">${xubnahaHTML}</div>
                            <div style="font-size:12px; color:var(--primary); margin-top:10px;"><b>Diiwaanka Guusha & Lacagaha:</b></div>
                            <div class="history-box">${logsHTML}</div>
                        </div>
                    `;
                });
                
                container.innerHTML = finalHTML;
                if (loginGroupSelect.innerHTML !== loginSelectHTML) loginGroupSelect.innerHTML = loginSelectHTML;
            } catch (err) { console.log(err); }
        }

        async function codsoLacagBixiin(groupId, memberId, magaca, lacagtaGuud, bixiyayHadda, account, saxPin) {
            let gashayPin = prompt("Geli PIN-kaaga gaarka ah (4 God):");
            if (gashayPin !== saxPin) { alert("PIN-kaagu waa khaldan yahay!"); return; }

            let dhiman = lacagtaGuud - bixiyayHadda;
            let bixiRaba = parseFloat(prompt(`Lacagta bishaan: ${lacagtaGuud} ETB\nHore waxaad u bixisay: ${bixiyayHadda} ETB\nHadda waxaa kugu dhiman: ${dhiman} ETB\n\nGeli cadadka aad hadda bixinayso:`));
            
            if(isNaN(bixiRaba) || bixiRaba <= 0 || bixiRaba > dhiman) { 
                alert("Cadadka aad gelisay ma saxna!"); 
                return; 
            }

            let shirkad = prompt(`Akoonka: ${account}\n\nGeli Shirkadda (CBE Birr / E-Birr / Zaad):`);
            if (!shirkad) return;

            let refNo = prompt("Geli Nambarka Xaqiijinta (Ref Number / Txn ID):");
            if(!refNo) return;

            let codsi = { 
                groupId: groupId, 
                memberId: memberId, 
                magaca: magaca, 
                lacagta: bixiRaba, 
                shirkad: shirkad, 
                refNo: refNo, 
                xaaladda: "pending" 
            };
            
            await fetch(`${FIREBASE_URL}/codsiyada/${groupId}_${memberId}.json`, { method: "PUT", body: JSON.stringify(codsi) });
            await fetch(`${FIREBASE_URL}/kooxaha/${groupId}/xubnaha/${memberId}/xaaladda.json`, { method: "PUT", body: JSON.stringify("pending") });
            
            alert("Codsigaaga qayb-bixinta waa la diray, gudoomiyaha ayaa ansixin doona!");
            sooJiidKooxaha();
        }

        async function xaqiijiMaamulka() {
            let pin = document.getElementById("adminPinInput").value.trim();
            let selectedGroup = document.getElementById("loginGroupSelect").value;

            if (pin === MASTER_PIN) {
                authedRole = 'master';
                document.getElementById("adminWelcomeTitle").innerText = "Maamulaha Guud (Master Admin)";
                document.getElementById("superAdminOnlySection").style.display = "block";
                document.getElementById("generalTicketsSection").style.display = "block";
                document.getElementById("adminAuthBox").style.display = "none";
                document.getElementById("adminDashboardContent").style.display = "block";
                document.getElementById("groupManageSelectorArea").style.display = "block"; 
                loadAdminDashboardData();
            } else if (selectedGroup && dhammaanKooxahaXogtooda[selectedGroup] && pin === dhammaanKooxahaXogtooda[selectedGroup].password) {
                authedRole = 'group_admin';
                authedGroupId = selectedGroup;
                document.getElementById("adminWelcomeTitle").innerText = `Maamulaha Kooxda: ${dhammaanKooxahaXogtooda[selectedGroup].magaca}`;
                document.getElementById("superAdminOnlySection").style.display = "none";
                document.getElementById("generalTicketsSection").style.display = "none"; // Admin kooxuhu ma arki karaan tikidada guud
                document.getElementById("adminAuthBox").style.display = "none";
                document.getElementById("adminDashboardContent").style.display = "block";
                document.getElementById("groupManageSelectorArea").style.display = "none"; 
                buuxiXogtaHagaajinta(authedGroupId); 
                loadAdminDashboardData();
            } else { alert("PIN-ka ama Kooxda aad dooratay waa khaldan tahay!"); }
        }

        function kabaxDashboard() {
            authedRole = null;
            authedGroupId = null;
            document.getElementById("adminPinInput").value = "";
            document.getElementById("adminAuthBox").style.display = "block";
            document.getElementById("adminDashboardContent").style.display = "none";
            document.getElementById("adminWelcomeTitle").innerText = "Admin Authorization";
        }

        function buuxiXogtaHagaajinta(gId) {
            if(!gId || !dhammaanKooxahaXogtooda[gId]) return;
            let k = dhammaanKooxahaXogtooda[gId];
            document.getElementById("editGroupName").value = k.magaca;
            document.getElementById("editGroupMoney").value = k.lacag;
            document.getElementById("editGroupAccount").value = k.account;
        }

        async function keydiIsbeddelkaKooxda() {
            let gId = (authedRole === 'master') ? document.getElementById("manageGroupSelect").value : authedGroupId;
            if(!gId) { alert("Fadlan dooro koox marka hore!"); return; }

            let magacaCusub = document.getElementById("editGroupName").value.trim();
            let lacagCusub = parseFloat(document.getElementById("editGroupMoney").value);
            let accountCusub = document.getElementById("editGroupAccount").value.trim();

            if(magacaCusub === "" || isNaN(lacagCusub) || accountCusub === "") {
                alert("Fadlan buuxi dhammaan meelaha bannaan!");
                return;
            }

            let meqoxubnood = dhammaanKooxahaXogtooda[gId].xubnaha ? dhammaanKooxahaXogtooda[gId].xubnaha.length : 0;
            let guudCusub = lacagCusub * meqoxubnood;

            await fetch(`${FIREBASE_URL}/kooxaha/${gId}/magaca.json`, { method: "PUT", body: JSON.stringify(magacaCusub) });
            await fetch(`${FIREBASE_URL}/kooxaha/${gId}/lacag.json`, { method: "PUT", body: JSON.stringify(lacagCusub) });
            await fetch(`${FIREBASE_URL}/kooxaha/${gId}/account.json`, { method: "PUT", body: JSON.stringify(accountCusub) });
            await fetch(`${FIREBASE_URL}/kooxaha/${gId}/guud.json`, { method: "PUT", body: JSON.stringify(guudCusub) });

            alert("Isbeddelka waa la keydiyay!");
            sooJiidKooxaha();
        }

        async function tirtirKooxdaRasmigaAh() {
            let gId = (authedRole === 'master') ? document.getElementById("manageGroupSelect").value : authedGroupId;
            if(!gId) { alert("Fadlan dooro koox marka hore!"); return; }
            let xaqiiji = confirm("Ma hubtaa inaad tirtirto kooxdan?");
            if(!xaqiiji) return;
            await fetch(`${FIREBASE_URL}/kooxaha/${gId}.json`, { method: "DELETE" });
            alert("Kooxda waa la tirtiray!");
            kabaxDashboard();
            sooJiidKooxaha();
        }

        // --- FETCH AND DISPLAY DATA SEQUENTIALLY (NO HOPPING/FLASHING) ---
        async function loadAdminDashboardData() {
            if (authedRole === null) return;
            
            // 1. ANXISINTA LACAGAHA (Master views ALL, Admin views only THEIR group)
            let pendingContainer = document.getElementById("pendingPaymentsContainer");
            try {
                let res = await fetch(`${FIREBASE_URL}/codsiyada.json`);
                let data = await res.json();
                let htmlContent = "";
                
                if (data && Object.keys(data).length > 0) {
                    Object.keys(data).forEach(key => {
                        let c = data[key];
                        if (authedRole === 'group_admin' && c.groupId !== authedGroupId) return;

                        htmlContent += `
                            <div class="member-row" style="background: #334155;">
                                <div>Kooxda: <b>${c.groupId}</b> | Xubin: <b>${c.magaca}</b><br>Lacag: ${c.lacagta} ETB (Ref: ${c.refNo})</div>
                                <div style="display:flex; gap:5px;">
                                    <button style="background:var(--success); border:none; padding:6px; width:auto; cursor:pointer;" onclick="ansixiLacag('${c.groupId}', ${c.memberId}, '${c.magaca}', ${c.lacagta}, '${key}')">Ansixi ✅</button>
                                    <button style="background:var(--danger); border:none; padding:6px; width:auto; cursor:pointer;" onclick="diidLacag('${c.groupId}', ${c.memberId}, '${key}')">Diid ❌</button>
                                </div>
                            </div>
                        `;
                    });
                }
                pendingContainer.innerHTML = htmlContent || "<p style='color:#aaa;'>Ma jiraan codsiyo lacag bixin oo sugaya ansixin.</p>";
            } catch (err) { console.log(err); }

            // 2. LIISKA CODSIYADA GUUD (Master Admin Only sees this sequentially)
            if(authedRole === 'master') {
                let ticketsContainer = document.getElementById("generalTicketsContainer");
                try {
                    let res = await fetch(`${FIREBASE_URL}/tikidhada.json`);
                    let tData = await res.json();
                    let tHTML = "";
                    
                    if(tData && Object.keys(tData).length > 0) {
                        Object.keys(tData).forEach(key => {
                            let t = tData[key];
                            tHTML += `
                                <div class="member-row" style="background:#2d3748; border-left: 4px solid var(--warning);">
                                    <div>
                                        <span class="badge" style="background:var(--warning);">${t.nooca}</span>
                                        <strong>Kooxda:</strong> ${t.groupId} | <strong>Qofka:</strong> ${t.magac}<br>
                                        <p style="margin:5px 0; color:#cbd5e1;">"${t.fariin}"</p>
                                        <small style="color:#94a3b8;">${t.waqti}</small>
                                    </div>
                                    <button style="background:var(--danger); border:none; padding:4px 8px; width:auto; cursor:pointer;" onclick="tirtirTikidh('${key}')">Xir 🗑️</button>
                                </div>
                            `;
                        });
                    }
                    ticketsContainer.innerHTML = tHTML || "<p style='color:#aaa;'>Ma jiraan cabashooyin ama codsiyo PIN oo furan.</p>";
                } catch(e) { console.log(e); }

                // 3. KU BIIRISTA KOOXAHA
                let joinContainer = document.getElementById("joinRequestsContainer");
                try {
                    let res = await fetch(`${FIREBASE_URL}/ku_biirista.json`);
                    let jData = await res.json();
                    let jHTML = "";
                    if(jData && Object.keys(jData).length > 0) {
                        Object.keys(jData).forEach(key => {
                            let j = jData[key];
                            jHTML += `
                                <div class="member-row" style="background: #1e293b;">
                                    <div>Kooxda: <b>${j.groupId}</b> | Magaca: <b>${j.magac}</b></div>
                                    <button style="background:var(--primary); border:none; padding:6px; width:auto; cursor:pointer;" onclick="ansixiKuBiiris('${j.groupId}', '${j.magac}', '${j.pin}', '${key}')">Oggolaaw 👤</button>
                                </div>
                            `;
                        });
                    }
                    joinContainer.innerHTML = jHTML || "<p style='color:#aaa;'>Ma jiraan codsiyo ku biiris ah.</p>";
                } catch(e) { console.log(e); }

                // Update group selectors for master
                let manageSelect = document.getElementById("manageGroupSelect");
                let currentVal = manageSelect.value;
                let optHTML = `<option value="">-- Dooro Koox --</option>`;
                Object.keys(dhammaanKooxahaXogtooda).forEach(k => {
                    optHTML += `<option value="${k}">${dhammaanKooxahaXogtooda[k].magaca}</option>`;
                });
                if(manageSelect.innerHTML !== optHTML) {
                    manageSelect.innerHTML = optHTML;
                    manageSelect.value = currentVal;
                }
            }
        }

        async function tirtirTikidh(key) {
            await fetch(`${FIREBASE_URL}/tikidhada/${key}.json`, { method: "DELETE" });
            loadAdminDashboardData();
        }

        async function ansixiLacag(groupId, memberId, magaca, lacagtaCusub, reqKey) {
            let kooxRes = await fetch(`${FIREBASE_URL}/kooxaha/${groupId}.json`);
            let koox = await kooxRes.json();
            let xubin = koox.xubnaha[memberId];
            let wadarBixiyayHadda = (xubin.bixiyayLacag || 0) + lacagtaCusub;

            await fetch(`${FIREBASE_URL}/kooxaha/${groupId}/xubnaha/${memberId}/bixiyayLacag.json`, { method: "PUT", body: JSON.stringify(wadarBixiyayHadda) });

            if(wadarBixiyayHadda >= koox.lacag) {
                await fetch(`${FIREBASE_URL}/kooxaha/${groupId}/xubnaha/${memberId}/xaaladda.json`, { method: "PUT", body: JSON.stringify("paid") });
            } else {
                await fetch(`${FIREBASE_URL}/kooxaha/${groupId}/xubnaha/${memberId}/xaaladda.json`, { method: "PUT", body: JSON.stringify("unpaid") });
            }
            
            let logMsg = `${magaca} wuxuu bixiyay (${lacagtaCusub} ETB).`;
            await fetch(`${FIREBASE_URL}/kooxaha/${groupId}/taariikhda.json`, { method: "POST", body: JSON.stringify(logMsg) });
            await fetch(`${FIREBASE_URL}/codsiyada/${reqKey}.json`, { method: "DELETE" });

            alert("Lacagta waa la ansixiyay!");
            loadAdminDashboardData();
            sooJiidKooxaha();
        }

        async function diidLacag(groupId, memberId, reqKey) {
            await fetch(`${FIREBASE_URL}/kooxaha/${groupId}/xubnaha/${memberId}/xaaladda.json`, { method: "PUT", body: JSON.stringify("unpaid") });
            await fetch(`${FIREBASE_URL}/codsiyada/${reqKey}.json`, { method: "DELETE" });
            alert("Codsigii lacagta waa la diiday.");
            loadAdminDashboardData();
            sooJiidKooxaha();
        }

        async function ansixiKuBiiris(groupId, magac, pin, reqKey) {
            let kooxRes = await fetch(`${FIREBASE_URL}/kooxaha/${groupId}.json`);
            let koox = await kooxRes.json();
            if(!koox.xubnaha) koox.xubnaha = [];
            let nambarkaCusubId = koox.xubnaha.length;

            let xubinCusub = { id: nambarkaCusubId, magac: magac, pin: pin, bixiyayLacag: 0, xaaladda: "unpaid" };
            koox.xubnaha.push(xubinCusub);
            let guudCusub = koox.lacag * koox.xubnaha.length;

            await fetch(`${FIREBASE_URL}/kooxaha/${groupId}/xubnaha.json`, { method: "PUT", body: JSON.stringify(koox.xubnaha) });
            await fetch(`${FIREBASE_URL}/kooxaha/${groupId}/guud.json`, { method: "PUT", body: JSON.stringify(guudCusub) });
            await fetch(`${FIREBASE_URL}/ku_biirista/${reqKey}.json`, { method: "DELETE" });

            alert(`Guul! ${magac} waa la oggolaaday.`);
            loadAdminDashboardData();
            sooJiidKooxaha();
        }
    </script>
</body>
</html>
